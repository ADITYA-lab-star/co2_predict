<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CO2 Emission Predictor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }

        .container {
            max-width: 600px;
            margin-top: 100px;
        }

        .card {
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h1 class="card-title mb-0">CO2 Emission Prediction</h1>
            </div>
            <div class="card-body">
                <p class="card-text">Enter the engine size of your vehicle to predict its CO2 emissions.</p>
                <form method="POST">
                    <div class="mb-3">
                        <label for="engine" class="form-label">Engine Size (Liters)</label>
                        <input type="number" step="0.1" class="form-control" id="engine" name="Engine" required>
                        <div class="form-text">Enter the engine size in liters (e.g., 2.0)</div>
                    </div>
                    <button type="submit" class="btn btn-primary">Predict CO2 Emissions</button>
                </form>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
